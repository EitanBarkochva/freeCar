<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הרשמה / התחברות</title>
  <!-- Rubik — חלופה חינמית קרובה לפונט אלמוני של PayBox -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7f6;
      --card: #ffffff;
      --panel: #f0f4f3;
      --text: #272727;
      --muted: #7b8794;
      --border: #e3e9e7;
      --accent: #00d084;
      --accent-dark: #00b06f;
      --red: #cf2e2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Rubik', 'Assistant', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%; max-width: 400px;
      box-shadow: 0 12px 40px rgba(16, 55, 40, 0.10);
      text-align: center;
    }
    .logo {
      width: 60px; height: 60px;
      background: var(--accent);
      border-radius: 18px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 6px 18px rgba(0, 208, 132, 0.35);
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p.sub { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

    .field { text-align: right; margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--panel); border: 1.5px solid transparent;
      border-radius: 14px; padding: 12px 14px; color: var(--text); font-size: 15px;
      font-family: inherit; transition: border-color .15s, background .15s;
    }
    .field input:focus { outline: none; border-color: var(--accent); background: #fff; }

    .row { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      flex: 1; border: none; border-radius: 999px; padding: 13px;
      font-size: 15px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: .15s;
    }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(0,208,132,.35); }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent-dark); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; color: var(--muted); font-size: 13px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .google-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; color: var(--text);
      border: 1.5px solid var(--border); border-radius: 999px;
      padding: 14px; font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: transform .1s, box-shadow .2s, border-color .15s;
    }
    .google-btn:hover { box-shadow: 0 6px 20px rgba(16,55,40,0.12); border-color: var(--accent); transform: translateY(-1px); }
    .google-btn img { width: 22px; height: 22px; }

    .status { font-size: 14px; margin-top: 16px; min-height: 18px; }
    .status.err { color: var(--red); }
    .status.ok { color: var(--accent-dark); }
    .badge { margin-top: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🚗</div>
    <h1>ברוכים הבאים</h1>
    <p class="sub">הירשמו או התחברו כדי להמשיך</p>

    <!-- טופס אימייל + סיסמה -->
    <div class="field">
      <label for="email">אימייל</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">סיסמה</label>
      <input type="password" id="password" placeholder="לפחות 6 תווים" autocomplete="current-password" />
    </div>
    <div class="row">
      <button class="btn btn-primary" id="signin">התחברות</button>
      <button class="btn btn-secondary" id="signup">הרשמה</button>
    </div>

    <div class="divider">או</div>

    <!-- התחברות עם Google -->
    <button class="google-btn" id="google-login">
      <img src="https://www.google.com/favicon.ico" alt="Google" />
      המשך עם Google
    </button>

    <div class="status" id="status"></div>
    <div class="badge">מאובטח באמצעות Supabase Auth</div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rwgkmsubpnjdyjhfzwpa.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NUgJgQXRpxk3zoBnEwBIYA_V7JTdg6V';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const statusEl = document.getElementById('status');
    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');

    function setStatus(msg, ok) {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + (ok ? 'ok' : 'err');
    }

    function goDashboard() { window.location.href = 'app.html'; }

    function getCreds() {
      const email = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) { setStatus('נא למלא אימייל וסיסמה', false); return null; }
      if (password.length < 6) { setStatus('הסיסמה חייבת להכיל לפחות 6 תווים', false); return null; }
      return { email, password };
    }

    // הרשמה עם אימייל + סיסמה
    document.getElementById('signup').addEventListener('click', async () => {
      const creds = getCreds(); if (!creds) return;
      setStatus('נרשם…', true);
      const { data, error } = await supabase.auth.signUp(creds);
      if (error) return setStatus('שגיאה: ' + error.message, false);
      if (data.session) {
        goDashboard(); // אם אישור אימייל מכובה — מחובר מיד
      } else {
        setStatus('נשלח אליך אימייל אישור — אשר אותו כדי להתחבר ✉️', true);
      }
    });

    // התחברות עם אימייל + סיסמה
    document.getElementById('signin').addEventListener('click', async () => {
      const creds = getCreds(); if (!creds) return;
      setStatus('מתחבר…', true);
      const { error } = await supabase.auth.signInWithPassword(creds);
      if (error) return setStatus('שגיאה: ' + error.message, false);
      goDashboard();
    });

    // התחברות עם Google
    document.getElementById('google-login').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) setStatus('שגיאה: ' + error.message, false);
    });

    // אם כבר מחובר — ישר לאזור האישי
    const { data: { session } } = await supabase.auth.getSession();
    if (session) goDashboard();
  </script>
</body>
</html>
