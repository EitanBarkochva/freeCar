<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הרשמה / התחברות</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }
    .logo {
      width: 56px; height: 56px;
      background: var(--accent);
      border-radius: 16px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p.sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
    .google-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #fff; color: #1f2937;
      border: none; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: transform .1s, box-shadow .2s;
    }
    .google-btn:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.3); transform: translateY(-1px); }
    .google-btn img { width: 22px; height: 22px; }
    .profile { display: none; }
    .profile img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 16px; border: 3px solid var(--accent); }
    .profile .name { font-size: 20px; font-weight: 600; }
    .profile .email { color: var(--muted); font-size: 14px; margin-top: 4px; margin-bottom: 24px; }
    .logout-btn {
      width: 100%; background: transparent; color: var(--muted);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 12px; font-size: 15px; cursor: pointer; transition: .2s;
    }
    .logout-btn:hover { background: var(--border); color: var(--text); }
    .error { color: #f87171; font-size: 14px; margin-top: 16px; display: none; }
    .badge { margin-top: 20px; font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <!-- מצב לפני התחברות -->
    <div id="login-view">
      <div class="logo">🚗</div>
      <h1>ברוכים הבאים</h1>
      <p class="sub">הירשמו או התחברו כדי להמשיך</p>
      <button class="google-btn" id="google-login">
        <img src="https://www.google.com/favicon.ico" alt="Google" />
        המשך עם Google
      </button>
      <div class="error" id="error-msg"></div>
    </div>

    <!-- מצב אחרי התחברות -->
    <div class="profile" id="profile-view">
      <img id="avatar" src="" alt="avatar" />
      <div class="name" id="user-name"></div>
      <div class="email" id="user-email"></div>
      <button class="logout-btn" id="logout">התנתקות</button>
    </div>

    <div class="badge">מאובטח באמצעות Supabase Auth</div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://rwgkmsubpnjdyjhfzwpa.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_NUgJgQXRpxk3zoBnEwBIYA_V7JTdg6V';

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginView = document.getElementById('login-view');
    const profileView = document.getElementById('profile-view');
    const errorMsg = document.getElementById('error-msg');

    // התחברות עם Google
    document.getElementById('google-login').addEventListener('click', async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) showError(error.message);
    });

    // התנתקות
    document.getElementById('logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      render(null);
    });

    function showError(msg) {
      errorMsg.textContent = 'שגיאה: ' + msg;
      errorMsg.style.display = 'block';
    }

    function render(user) {
      if (user) {
        // מחובר — מעבר לאזור האישי
        window.location.href = 'dashboard.html';
      } else {
        loginView.style.display = 'block';
        profileView.style.display = 'none';
      }
    }

    // בדיקת מצב התחברות בטעינת הדף ובכל שינוי
    supabase.auth.onAuthStateChange((_event, session) => {
      render(session?.user ?? null);
    });

    const { data: { session } } = await supabase.auth.getSession();
    render(session?.user ?? null);
  </script>
</body>
</html>
