  <style>

    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #7b8794; margin-bottom: 24px; }
    a {
      display: inline-block; background: #00d084; color: #fff; text-decoration: none;
      border-radius: 999px; padding: 12px 28px; font-weight: 600;
      box-shadow: 0 4px 14px rgba(0,208,132,.35); transition: .15s;
    }
    a:hover { background: #00b06f; transform: translateY(-1px); }
  </style>
</head>
